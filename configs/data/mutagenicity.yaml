dataset_name: Mutagenicity
dataset_version: v1
smiles_col: smiles
label_col: label
positive_label: 1
positive_semantics: mutagenic
negative_label: 0
negative_semantics: non_mutagenic
source_label_for_main_experiment: 1
target_label_for_main_experiment: 0
split_seed: 42
split_ratios:
  train: 0.70
  val: 0.10
  calibration: 0.10
  test: 0.10
canonical_isomeric: true
neutralize: false
tautomer_canonicalize: false
drop_multicomponent: true
dedup_key: canonical_isomeric_smiles

