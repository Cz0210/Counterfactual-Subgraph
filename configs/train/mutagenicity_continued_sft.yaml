dataset_name: Mutagenicity
dataset_version: v1
source_label: 1
target_label: 0

data.preferred_root: outputs/hpc/mutagenicity/final/sft_ppo_data_v1
data.fallback_root: outputs/hpc/mutagenicity/sft_ppo_data_v1
data.expected_train_rows: 1317
data.expected_val_rows: 250
data.train_file: mutagenicity_sft_train.csv
data.val_file: mutagenicity_sft_val.csv
data.forbidden_splits: calibration,test

model.base_model_path: pretrained_models/ChemLLM-7B-Chat
model.tokenizer_path: pretrained_models/ChemLLM-7B-Chat
model.base_checkpoint: outputs/hpc/sft_checkpoints/sft_v3_hiv_20260508_resplit_lr2e4_seed7_fix_columns/checkpoint-500
model.initialization: continued_peft_adapter

training.seed: 7
training.max_train_rows: 0
