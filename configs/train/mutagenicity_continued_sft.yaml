dataset_name: Mutagenicity
dataset_version: v1
source_label: 1
target_label: 0

data:
  preferred_root: outputs/hpc/mutagenicity/final/sft_ppo_data_v1
  fallback_root: outputs/hpc/mutagenicity/sft_ppo_data_v1
  expected_train_rows: 1317
  expected_val_rows: 250
  train_file: mutagenicity_sft_train.csv
  val_file: mutagenicity_sft_val.csv
  forbidden_splits:
    - calibration
    - test

model:
  base_model_path: pretrained_models/ChemLLM-7B-Chat
  tokenizer_path: pretrained_models/ChemLLM-7B-Chat
  base_checkpoint: outputs/hpc/sft_checkpoints/sft_v3_hiv_20260508_resplit_lr2e4_seed7_fix_columns/checkpoint-500
  initialization: continued_peft_adapter

training:
  seed: 7
  max_train_rows: 0
  max_val_rows: 0
  max_sequence_length: 1024
  max_steps: 500
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 3
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  fp16: false
  report_to: none

generation:
  generation_samples: 250
  generation_max_new_tokens: 64

smoke:
  output_root: outputs/hpc/mutagenicity/sft_continued_v1_smoke
  max_train_rows: 64
  max_val_rows: 32
  max_steps: 3
  logging_steps: 1
  save_steps: 1
  eval_steps: 1
  save_total_limit: 3
  generation_samples: 16

full:
  output_root: outputs/hpc/mutagenicity/sft_continued_v1
