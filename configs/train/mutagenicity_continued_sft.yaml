training.max_sequence_length: 1024
training.max_steps: 500
training.per_device_train_batch_size: 4
training.per_device_eval_batch_size: 4
training.gradient_accumulation_steps: 4
training.learning_rate: 0.0002
training.logging_steps: 10
training.save_steps: 100
training.eval_steps: 100
training.save_total_limit: 3
training.warmup_ratio: 0.03
training.lr_scheduler_type: cosine
training.bf16: true
training.fp16: false
training.report_to: "none"

generation.generation_samples: 250
generation.generation_max_new_tokens: 64

smoke.output_root: outputs/hpc/mutagenicity/sft_continued_v1_smoke
